server:
  port: ${SERVER_PORT:8086}

spring:
  application:
    name: orchestrator-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 4
      pool-name: OrchestratorHikariPool
  jpa:
    properties:
      hibernate:
        default_schema: chrono_orchestrator
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: chrono_orchestrator
    liquibase-schema: chrono_orchestrator

async:
  executor:
    core-pool-size: 10
    max-pool-size: 30
    queue-capacity: 100
    thread-name-prefix: orchestrator-async-

logging:
  level:
    com.chrono.orchestrator: INFO
