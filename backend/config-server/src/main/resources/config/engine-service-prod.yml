server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: engine-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      pool-name: EngineHikariPool
  jpa:
    properties:
      hibernate:
        default_schema: chrono_engine
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: chrono_engine
    liquibase-schema: chrono_engine
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
  cache:
    type: redis
    redis:
      time-to-live: 86400000

logging:
  level:
    com.chrono.engine: INFO
