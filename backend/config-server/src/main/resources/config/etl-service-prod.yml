server:
  port: ${SERVER_PORT:8087}

spring:
  application:
    name: etl-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      pool-name: EtlHikariPool
  jpa:
    properties:
      hibernate:
        default_schema: chrono_etl
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: chrono_etl
    liquibase-schema: chrono_etl
  batch:
    initialize-schema: never
    job:
      enabled: false

async:
  executor:
    core-pool-size: 10
    max-pool-size: 30
    queue-capacity: 100
    thread-name-prefix: etl-async-

logging:
  level:
    com.chrono.etl: INFO
    org.springframework.batch: WARN
