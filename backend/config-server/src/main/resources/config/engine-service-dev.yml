server:
  port: 8085

spring:
  application:
    name: engine-service
  datasource:
    url: jdbc:postgresql://localhost:5432/chrono_db?currentSchema=chrono_engine
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      pool-name: EngineHikariPool
  jpa:
    properties:
      hibernate:
        default_schema: chrono_engine
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: chrono_engine
    liquibase-schema: chrono_engine
  redis:
    host: localhost
    port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 86400000  # 24 h (idempotency cache)

logging:
  level:
    com.chrono.engine: DEBUG
