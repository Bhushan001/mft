server:
  port: 8084

spring:
  application:
    name: mapper-service
  datasource:
    url: jdbc:postgresql://localhost:5432/chrono_db?currentSchema=chrono_mapper
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      pool-name: MapperHikariPool
  jpa:
    properties:
      hibernate:
        default_schema: chrono_mapper
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: chrono_mapper
    liquibase-schema: chrono_mapper
  redis:
    host: localhost
    port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 900000   # 15 min

logging:
  level:
    com.chrono.mapper: DEBUG
