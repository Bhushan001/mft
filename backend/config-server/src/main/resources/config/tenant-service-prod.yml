server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: tenant-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 8
      minimum-idle: 2
      pool-name: TenantHikariPool
  jpa:
    properties:
      hibernate:
        default_schema: chrono_tenants
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: chrono_tenants
    liquibase-schema: chrono_tenants
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
  cache:
    type: redis
    redis:
      time-to-live: 1800000

logging:
  level:
    com.chrono.tenant: INFO
