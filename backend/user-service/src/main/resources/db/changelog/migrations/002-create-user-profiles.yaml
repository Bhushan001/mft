databaseChangeLog:
  - changeSet:
      id: 002-create-user-profiles
      author: chrono
      changes:
        - createTable:
            schemaName: chrono_user
            tableName: user_profiles
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: first_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: phone
                  type: VARCHAR(30)
              - column:
                  name: tenant_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: ACTIVE
                  constraints:
                    nullable: false
              - column:
                  name: avatar_url
                  type: VARCHAR(500)
              - column:
                  name: timezone
                  type: VARCHAR(50)
                  defaultValue: UTC
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: created_by
                  type: VARCHAR(100)
              - column:
                  name: updated_by
                  type: VARCHAR(100)
              - column:
                  name: deleted_at
                  type: TIMESTAMP

        - createIndex:
            schemaName: chrono_user
            tableName: user_profiles
            indexName: idx_up_tenant_id
            columns:
              - column:
                  name: tenant_id
