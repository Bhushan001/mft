databaseChangeLog:
  - changeSet:
      id: 003-create-workflow-steps
      author: chrono
      changes:
        - createTable:
            schemaName: chrono_orchestrator
            tableName: workflow_steps
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: workflow_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_ws_workflow
                    references: chrono_orchestrator.workflows(id)
              - column:
                  name: step_order
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: step_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: input_payload
                  type: TEXT
              - column:
                  name: output_payload
                  type: TEXT
              - column:
                  name: compensation_payload
                  type: TEXT
              - column:
                  name: error_message
                  type: VARCHAR(1000)
              - column:
                  name: executed_at
                  type: TIMESTAMP
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: created_by
                  type: VARCHAR(100)
              - column:
                  name: updated_by
                  type: VARCHAR(100)
              - column:
                  name: deleted_at
                  type: TIMESTAMP
        - createIndex:
            schemaName: chrono_orchestrator
            tableName: workflow_steps
            indexName: idx_ws_workflow_id
            columns:
              - column:
                  name: workflow_id
