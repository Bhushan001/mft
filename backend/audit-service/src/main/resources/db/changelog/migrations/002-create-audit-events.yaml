databaseChangeLog:
  - changeSet:
      id: 002-create-audit-events
      author: chrono
      changes:
        - createTable:
            tableName: audit_events
            schemaName: chrono_audit
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: event_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: action
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: resource_type
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: resource_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: performed_by
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
              - column:
                  name: tenant_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
              - column:
                  name: details
                  type: TEXT
              - column:
                  name: ip_address
                  type: VARCHAR(50)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false

        - createIndex:
            indexName: idx_ae_tenant_id
            tableName: audit_events
            schemaName: chrono_audit
            columns:
              - column:
                  name: tenant_id

        - createIndex:
            indexName: idx_ae_action
            tableName: audit_events
            schemaName: chrono_audit
            columns:
              - column:
                  name: action

        - createIndex:
            indexName: idx_ae_resource_type
            tableName: audit_events
            schemaName: chrono_audit
            columns:
              - column:
                  name: resource_type

        - createIndex:
            indexName: idx_ae_performed_by
            tableName: audit_events
            schemaName: chrono_audit
            columns:
              - column:
                  name: performed_by

        - createIndex:
            indexName: idx_ae_created_at
            tableName: audit_events
            schemaName: chrono_audit
            columns:
              - column:
                  name: created_at
