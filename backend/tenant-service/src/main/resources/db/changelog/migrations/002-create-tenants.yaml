databaseChangeLog:
  - changeSet:
      id: 002-create-tenants
      author: chrono
      changes:
        - createTable:
            schemaName: chrono_tenant
            tableName: tenants
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: slug
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: ACTIVE
                  constraints:
                    nullable: false
              - column:
                  name: plan
                  type: VARCHAR(30)
                  defaultValue: FREE
                  constraints:
                    nullable: false
              - column:
                  name: contact_email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: max_users
                  type: INT
                  defaultValueNumeric: 10
                  constraints:
                    nullable: false
              - column:
                  name: timezone
                  type: VARCHAR(50)
                  defaultValue: UTC
              - column:
                  name: settings
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: created_by
                  type: VARCHAR(100)
              - column:
                  name: updated_by
                  type: VARCHAR(100)
              - column:
                  name: deleted_at
                  type: TIMESTAMP
